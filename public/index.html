<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Chat</title>
  <style>
    :root {
      --bg: #1a1b2e;
      --surface: #23243a;
      --surface-hover: #2a2b44;
      --primary: #7c6ff7;
      --primary-hover: #6a5ce7;
      --text: #e8e8f0;
      --text-secondary: #9090a8;
      --user-bubble: #7c6ff7;
      --ai-bubble: #2a2b44;
      --border: #3a3b54;
      --error: #f76f6f;
      --sidebar-width: 280px;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
    }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.25s ease;
      z-index: 100;
    }

    #sidebar.hidden {
      transform: translateX(-100%);
      position: absolute;
      height: 100%;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .new-chat-btn {
      width: 100%;
      padding: 10px 14px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .new-chat-btn:hover {
      border-color: var(--primary);
      color: var(--text);
      background: var(--surface-hover);
    }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversations-list::-webkit-scrollbar { width: 4px; }
    .conversations-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .conv-item {
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      margin-bottom: 2px;
    }

    .conv-item:hover { background: var(--surface-hover); }
    .conv-item.active { background: var(--surface-hover); }

    .conv-item .conv-title {
      flex: 1;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-item .conv-date {
      font-size: 11px;
      color: var(--text-secondary);
      flex-shrink: 0;
      margin-right: 4px;
    }

    .conv-item .delete-conv {
      opacity: 0;
      background: none;
      border: none;
      color: var(--error);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .conv-item:hover .delete-conv { opacity: 1; }
    .conv-item .delete-conv:hover { background: rgba(247, 111, 111, 0.15); }

    /* Main area */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #toggle-sidebar {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
    }

    #toggle-sidebar:hover { background: var(--surface-hover); color: var(--text); }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 .icon { font-size: 22px; }

    .status-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--surface-hover);
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.2s;
      user-select: none;
    }
    .status-badge:hover { color: var(--text); }
    .status-badge.online { background: #2d7a4f; color: #a0f0c0; }
    .status-badge.offline { background: #7a2d2d; color: #f0a0a0; }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      max-width: 780px;
      margin: 0 auto 16px;
      padding: 0 20px;
      display: flex;
      gap: 12px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .avatar.user { background: var(--user-bubble); }
    .avatar.ai { background: var(--primary); }

    .bubble {
      padding: 10px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-left-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator */
    .typing .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typingBounce 1.2s infinite;
      margin: 0 1px;
    }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Welcome screen */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 20px;
    }

    #welcome .logo { font-size: 48px; margin-bottom: 16px; }
    #welcome h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    #welcome p { color: var(--text-secondary); font-size: 15px; }

    /* Input area */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
      background: var(--surface);
    }

    .input-wrapper {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 160px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s;
    }

    #input:focus { border-color: var(--primary); }
    #input::placeholder { color: var(--text-secondary); }

    #send {
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
      height: 46px;
    }

    #send:hover { background: var(--primary-hover); }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }

    #cancel {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-secondary);
      font-size: 15px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
      display: none;
      height: 46px;
    }
    #cancel:hover { background: var(--surface-hover); color: var(--text); }

    .hint {
      max-width: 780px;
      margin: 0 auto;
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      opacity: 0.7;
    }

    /* Empty state for sidebar */
    .sidebar-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .sidebar-empty p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-header">
    <button class="new-chat-btn" onclick="newConversation()">
      <span>✏️</span> 新建对话
    </button>
  </div>
  <div class="conversations-list" id="conversations-list">
    <div class="sidebar-empty"><p>暂无对话记录<br>点击上方按钮开始</p></div>
  </div>
</div>

<!-- Main area -->
<div id="main">
  <header>
    <div class="header-left">
      <button id="toggle-sidebar" onclick="toggleSidebar()" title="切换侧边栏">☰</button>
      <h1><span class="icon">💬</span> LLM Chat</h1>
    </div>
    <span class="status-badge" id="status" onclick="resetConnection()">检测中…</span>
  </header>

  <div id="chat">
    <div id="welcome">
      <div class="logo">🤖</div>
      <h2>开始对话</h2>
      <p>下方输入你的问题，点击发送即可开始</p>
    </div>
  </div>

  <div id="input-area">
    <div class="input-wrapper">
      <textarea id="input" rows="1" placeholder="输入消息… (Enter 发送，Shift+Enter 换行)" wrap="soft"></textarea>
      <button id="send" onclick="sendMessage()">发送</button>
      <button id="cancel" onclick="cancelStreaming()">取消</button>
    </div>
    <div class="hint">按 Enter 发送 · 模型: 本地 LLM</div>
  </div>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const welcome = document.getElementById("welcome");
  const statusBadge = document.getElementById("status");
  const sidebar = document.getElementById("sidebar");
  const convListEl = document.getElementById("conversations-list");

  // ── Conversation storage ──────────────────────────────────────────
  const STORAGE_KEY = "llm-chat-conversations";

  function loadConversations() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { return []; }
  }

  function saveConversations(convs) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(convs));
  }

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  let conversations = loadConversations();
  let currentConvId = null;

  // Current conversation's messages (in memory, synced to storage on change)
  let messages = [];

  // ── Sidebar logic ─────────────────────────────────────────────────
  function toggleSidebar() {
    sidebar.classList.toggle("hidden");
  }

  function renderConversationList() {
    convListEl.innerHTML = "";
    if (conversations.length === 0) {
      convListEl.innerHTML = '<div class="sidebar-empty"><p>暂无对话记录<br>点击上方按钮开始</p></div>';
      return;
    }
    // Sort by updatedAt desc
    conversations.sort((a, b) => b.updatedAt - a.updatedAt);
    for (const conv of conversations) {
      const item = document.createElement("div");
      item.className = `conv-item${conv.id === currentConvId ? " active" : ""}`;

      const title = document.createElement("span");
      title.className = "conv-title";
      title.textContent = conv.title;
      title.title = conv.title;

      const date = document.createElement("span");
      date.className = "conv-date";
      date.textContent = formatDate(conv.updatedAt);

      const delBtn = document.createElement("button");
      delBtn.className = "delete-conv";
      delBtn.textContent = "🗑️";
      delBtn.title = "删除此对话";
      delBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        deleteConversation(conv.id);
      });

      item.appendChild(title);
      item.appendChild(date);
      item.appendChild(delBtn);
      item.addEventListener("click", () => switchConversation(conv.id));

      convListEl.appendChild(item);
    }
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    const diffHr = Math.floor(diffMs / 3600000);
    const diffDay = Math.floor(diffMs / 86400000);

    if (diffMin < 1) return "刚刚";
    if (diffMin < 60) return diffMin + "分钟前";
    if (diffHr < 24) return diffHr + "小时前";
    if (diffDay < 7) return diffDay + "天前";
    return d.toLocaleDateString("zh-CN", { month: "2-digit", day: "2-digit" });
  }

  function newConversation() {
    // Save current conversation first
    if (currentConvId && messages.length > 0) {
      saveCurrentToStorage();
    }

    const conv = {
      id: generateId(),
      title: "新对话",
      messages: [],
      createdAt: Date.now(),
      updatedAt: Date.now(),
    };
    conversations.push(conv);
    currentConvId = conv.id;
    messages = [];
    saveConversations(conversations);
    renderConversationList();
    showWelcome();
    input.focus();
  }

  function switchConversation(convId) {
    // Save current conversation first
    if (currentConvId && messages.length > 0) {
      saveCurrentToStorage();
    }

    const conv = conversations.find((c) => c.id === convId);
    if (!conv) return;

    currentConvId = conv.id;
    messages = [...conv.messages]; // shallow copy
    renderConversationList();
    renderMessages();
  }

  function deleteConversation(convId) {
    conversations = conversations.filter((c) => c.id !== convId);
    saveConversations(conversations);

    if (currentConvId === convId) {
      currentConvId = null;
      messages = [];
      showWelcome();
    }
    renderConversationList();
  }

  function saveCurrentToStorage() {
    if (!currentConvId) return;
    const conv = conversations.find((c) => c.id === currentConvId);
    if (!conv) return;
    conv.messages = messages.map((m) => ({ ...m }));
    conv.updatedAt = Date.now();
    // Update title from first user message
    const firstUserMsg = messages.find((m) => m.role === "user");
    if (firstUserMsg && conv.title === "新对话") {
      conv.title = firstUserMsg.content.slice(0, 30) + (firstUserMsg.content.length > 30 ? "…" : "");
    }
    saveConversations(conversations);
  }

  function syncCurrentFromStorage() {
    const conv = conversations.find((c) => c.id === currentConvId);
    if (!conv) return;
    conv.messages = messages.map((m) => ({ ...m }));
    conv.updatedAt = Date.now();
    saveConversations(conversations);
  }

  function showWelcome() {
    welcome.style.display = "flex";
    // Remove all message elements
    chat.querySelectorAll(".message").forEach((el) => el.remove());
  }

  function renderMessages() {
    welcome.style.display = messages.length === 0 ? "flex" : "none";
    // Remove old messages
    chat.querySelectorAll(".message").forEach((el) => el.remove());
    for (const msg of messages) {
      addMessage(msg.role, msg.content, false);
    }
  }

  // ── Chat logic ────────────────────────────────────────────────────
  let isStreaming = false;
  let isConnected = false;
  let currentController = null;

  // Auto-resize textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });

  // Enter to send
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  async function checkHealth() {
    try {
      const res = await fetch("/api/health");
      if (res.ok) {
        isConnected = true;
        statusBadge.textContent = "已连接";
        statusBadge.className = "status-badge online";
      }
    } catch {
      isConnected = false;
      statusBadge.textContent = "未连接";
      statusBadge.className = "status-badge offline";
    }
  }

  function resetConnection() {
    checkHealth();
  }

  function addMessage(role, content, animate = true) {
    if (welcome && messages.length === 0 && role !== undefined) {
      welcome.style.display = "none";
    }

    const msg = document.createElement("div");
    msg.className = `message ${role}`;
    if (!animate) msg.style.animation = "none";

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === "user" ? "🧑" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chat.appendChild(msg);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    if (welcome) welcome.style.display = "none";
    const msg = document.createElement("div");
    msg.className = "message ai";
    msg.id = "typing-msg";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai";
    avatar.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble typing";
    bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chat.appendChild(msg);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById("typing-msg");
    if (el) el.remove();
  }

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isStreaming) return;

    input.value = "";
    input.style.height = "auto";

    // Create new conversation if none selected
    if (!currentConvId) {
      newConversation();
    }

    addMessage("user", text);
    messages.push({ role: "user", content: text });

    isStreaming = true;
    sendBtn.style.display = "none";
    document.getElementById("cancel").style.display = "inline-block";
    showTyping();

    currentController = new AbortController();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages }),
        signal: currentController.signal,
      });

      removeTyping();

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const bubble = addMessage("ai", "");
      let fullContent = "";

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6);
          if (data === "") continue;

          try {
            const json = JSON.parse(data);
            if (json.error) {
              bubble.textContent = `⚠️ ${json.error}`;
              messages.push({ role: "assistant", content: `⚠️ ${json.error}` });
              syncCurrentFromStorage();
              renderConversationList();
              return;
            }
            if (json.done) {
              messages.push({ role: "assistant", content: fullContent });
              syncCurrentFromStorage();
              renderConversationList();
              return;
            }
            if (json.content !== undefined) {
              fullContent += json.content;
              bubble.textContent = fullContent;
              scrollToBottom();
            }
          } catch { /* skip parse errors */ }
        }
      }

      if (fullContent === "") {
        removeTyping();
        addMessage("ai", "⚠️ 连接中断，未能收到回复。");
        messages.push({ role: "assistant", content: "⚠️ 连接中断，未能收到回复。" });
        syncCurrentFromStorage();
        renderConversationList();
      }
    } catch (err) {
      if (err.name === "AbortError") {
        addMessage("ai", "（已取消）");
        messages.push({ role: "assistant", content: "（已取消）" });
        syncCurrentFromStorage();
        renderConversationList();
      } else {
        removeTyping();
        addMessage("ai", `⚠️ 请求失败: ${err.message}`);
        messages.push({ role: "assistant", content: `⚠️ 请求失败: ${err.message}` });
        syncCurrentFromStorage();
        renderConversationList();
      }
    } finally {
      currentController = null;
      isStreaming = false;
      sendBtn.style.display = "inline-block";
      document.getElementById("cancel").style.display = "none";
      sendBtn.disabled = false;
    }
  }

  function cancelStreaming() {
    if (currentController) {
      currentController.abort();
    }
  }

  // ── Init ──────────────────────────────────────────────────────────
  renderConversationList();
  checkHealth();
</script>

</body>
</html>
