<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital@0;1&family=Inter:wght@400;500;600&family=Sora:wght@400;600&display=swap" rel="stylesheet">
  <script src="marked.min.js"></script>
  <style>
    :root {
      --void: #0a0a0a;
      --surface: #111111;
      --surface-hover: #1a1a1a;
      --border: #2a2a2a;
      --text: #f5f0e8;
      --text-secondary: #7a7a7a;
      --text-tertiary: #4a4a4a;
      --accent: #8ab648;
      --accent-dim: rgba(138, 182, 72, 0.12);
      --amber: #c4956a;
      --error: #d46a6a;
      --sidebar-width: 260px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--void);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Layout ─────────────────────────────────────────────────────── */

    #app {
      display: flex;
      height: 100%;
    }

    /* ── Sidebar ────────────────────────────────────────────────────── */

    #sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.2s ease, opacity 0.2s ease;
      z-index: 100;
    }

    #sidebar.hidden {
      transform: translateX(-100%);
      position: absolute;
      height: 100%;
      opacity: 0;
      pointer-events: none;
    }

    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
    }

    .new-chat-btn {
      width: 100%;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: "IBM Plex Mono", monospace;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      letter-spacing: 0.02em;
    }

    .new-chat-btn:hover {
      border-color: var(--text-secondary);
      color: var(--text);
    }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversations-list::-webkit-scrollbar { width: 3px; }
    .conversations-list::-webkit-scrollbar-thumb { background: var(--border); }

    .conv-item {
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.12s;
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      margin-bottom: 1px;
    }

    .conv-item:hover { background: var(--surface-hover); }
    .conv-item.active { background: var(--surface-hover); }

    .conv-title {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-meta {
      font-size: 11px;
      font-family: "IBM Plex Mono", monospace;
      color: var(--text-tertiary);
    }

    .conv-actions {
      position: absolute;
      top: 6px;
      right: 8px;
      opacity: 0;
      transition: opacity 0.12s;
    }

    .conv-item:hover .conv-actions { opacity: 1; }

    .delete-btn {
      background: none;
      border: none;
      color: var(--error);
      font-size: 12px;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 3px;
      transition: background 0.12s;
    }

    .delete-btn:hover { background: rgba(212, 106, 106, 0.1); }

    /* ── Main ───────────────────────────────────────────────────────── */

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Header */
    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #toggle-sidebar {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 4px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
    }

    #toggle-sidebar:hover { background: var(--surface-hover); color: var(--text); }

    /* Add focus-visible for better keyboard navigation */
    button:focus-visible,
    textarea:focus-visible,
    .status-indicator:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      z-index: 10;
    }

    header h1 {
      font-family: "Sora", sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-indicator {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .status-indicator:hover { color: var(--text); border-color: var(--text-secondary); }
    .status-indicator.online { border-color: var(--accent); color: var(--accent); }
    .status-indicator.offline { border-color: var(--error); color: var(--error); opacity: 0.7; }

    /* ── Chat ───────────────────────────────────────────────────────── */

    #chat-area {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); }

    .messages-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px 120px;
    }

    /* Message blocks */
    .message {
      margin-bottom: 28px;
      animation: messageIn 0.3s ease;
    }

    @keyframes messageIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .role-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .role-label.user { color: var(--text); }
    .role-label.ai { color: var(--accent); }

    .role-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .message-time {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      color: var(--text-tertiary);
    }

    .message-body {
      padding-left: 0;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
    }

    .message-body p { margin-bottom: 12px; }
    .message-body p:last-child { margin-bottom: 0; }

    .message-body code {
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 3px;
      color: var(--amber);
    }

    .message-body pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin: 12px 0;
      overflow-x: auto;
    }

    .message-body pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
    }

    /* Markdown styles */
    .message-body h1,
    .message-body h2,
    .message-body h3,
    .message-body h4,
    .message-body h5,
    .message-body h6 {
      font-weight: 600;
      margin: 16px 0 8px;
      color: var(--text);
    }

    .message-body h1 { font-size: 22px; }
    .message-body h2 { font-size: 18px; }
    .message-body h3 { font-size: 16px; }
    .message-body h4,
    .message-body h5,
    .message-body h6 { font-size: 15px; }

    .message-body ul,
    .message-body ol {
      margin: 12px 0;
      padding-left: 24px;
    }

    .message-body li {
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .message-body blockquote {
      margin: 12px 0;
      padding: 8px 12px;
      border-left: 3px solid var(--accent);
      background: var(--surface-hover);
      border-radius: 0 6px 6px 0;
      color: var(--text-secondary);
    }

    .message-body blockquote p {
      margin: 0;
      font-size: 14px;
    }

    .message-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .message-body a {
      color: var(--accent);
      text-decoration: none;
    }

    .message-body a:hover {
      text-decoration: underline;
    }

    .message.error .message-body {
      color: var(--error);
      background: rgba(212, 106, 106, 0.1);
      border-radius: 6px;
      padding: 12px 16px;
    }

    /* ── Welcome ────────────────────────────────────────────────────── */

    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 24px;
    }

    .welcome-title {
      font-family: "Sora", sans-serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      color: var(--text);
    }

    .welcome-sub {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 360px;
      line-height: 1.6;
    }

    .welcome-hint {
      margin-top: 32px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      color: var(--text-tertiary);
      letter-spacing: 0.02em;
    }

    /* ── Thinking indicator ─────────────────────────────────────────── */

    .thinking {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
    }

    .thinking-ring {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      animation: breathe 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.3; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1); }
    }

    .thinking-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      color: var(--accent);
      font-style: italic;
      letter-spacing: 0.02em;
    }

    /* ── Input ──────────────────────────────────────────────────────── */

    #input-area {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      flex-shrink: 0;
      background: var(--void);
    }

    .input-container {
      max-width: 720px;
      margin: 0 auto;
    }

    .input-box {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .input-box:focus-within {
      border-color: var(--accent);
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      resize: none;
      line-height: 1.5;
      outline: none;
      min-height: 44px;
      max-height: 160px;
    }

    #input::placeholder { color: var(--text-tertiary); }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
    }

    #send {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: var(--accent);
      color: var(--void);
      font-size: 13px;
      font-weight: 600;
      font-family: "IBM Plex Mono", monospace;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    #send:hover { opacity: 0.85; }
    #send:disabled { opacity: 0.35; cursor: not-allowed; }

    #cancel {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    #cancel:hover { background: var(--surface-hover); color: var(--text); }

    .input-footer {
      text-align: center;
      margin-top: 8px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    /* ── Empty sidebar ──────────────────────────────────────────────── */

    .sidebar-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .sidebar-empty p {
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.7;
    }

    /* ── Responsive ─────────────────────────────────────────────────── */

    @media (max-width: 768px) {
      #sidebar {
        position: absolute;
        height: 100%;
        z-index: 200;
      }
      #sidebar.hidden { transform: translateX(-100%); }
      .messages-container { padding: 20px 16px 100px; }
      #input-area { padding: 12px 16px; }
      header { padding: 12px 16px; }
    }

    /* ── Reduced motion ─────────────────────────────────────────────── */

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Focus visible ──────────────────────────────────────────────── */

    :focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="newConversation()">
        <span>+</span> 新建对话
      </button>
    </div>
    <div class="conversations-list" id="conversations-list"></div>
  </aside>

  <!-- Main -->
  <main id="main">
    <header>
      <div class="header-left">
        <button id="toggle-sidebar" onclick="toggleSidebar()" title="切换侧边栏" aria-label="切换侧边栏">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="1" y1="3" x2="13" y2="3"/>
            <line x1="1" y1="7" x2="13" y2="7"/>
            <line x1="1" y1="11" x2="13" y2="11"/>
          </svg>
        </button>
        <h1>Chat</h1>
      </div>
      <div class="header-right">
        <span class="status-indicator" id="status" onclick="checkHealth()">检测中</span>
      </div>
    </header>

    <div id="chat-area">
      <div id="welcome">
        <div class="welcome-title">开始对话</div>
        <div class="welcome-sub">在下方输入你的问题，与 AI 进行对话</div>
        <div class="welcome-hint">Enter 发送 · Shift+Enter 换行</div>
      </div>
      <div class="messages-container" id="messages-container"></div>
    </div>

    <div id="input-area">
      <div class="input-container">
        <div class="input-box">
          <textarea id="input" rows="1" placeholder="输入消息…" wrap="soft"></textarea>
          <div class="input-actions">
            <button id="send" onclick="sendMessage()">发送</button>
            <button id="cancel" onclick="cancelStreaming()" style="display:none">取消</button>
          </div>
        </div>
        <div class="input-footer">模型: 本地 LLM · 数据保存在本地</div>
      </div>
    </div>
  </main>
</div>

<script>
  // ── DOM refs ────────────────────────────────────────────────────────
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const cancelBtn = document.getElementById("cancel");
  const welcome = document.getElementById("welcome");
  const chatArea = document.getElementById("chat-area");
  const messagesContainer = document.getElementById("messages-container");
  const statusEl = document.getElementById("status");
  const sidebar = document.getElementById("sidebar");
  const convListEl = document.getElementById("conversations-list");

  // ── Storage ─────────────────────────────────────────────────────────
  const STORAGE_KEY = "llm-chat-conversations";

  function loadConversations() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveConversations(convs) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(convs));
  }

  function generateId() {
    if (typeof crypto !== "undefined" && crypto.randomUUID) {
      return crypto.randomUUID();
    }
    // Fallback for older browsers
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  let conversations = loadConversations();
  let currentConvId = null;
  let messages = [];

  // ── Sidebar ─────────────────────────────────────────────────────────
  function toggleSidebar() {
    sidebar.classList.toggle("hidden");
  }

  function formatDate(ts) {
    const now = new Date();
    const d = new Date(ts);
    const diffMs = now - d;
    const min = Math.floor(diffMs / 60000);
    const hr = Math.floor(diffMs / 3600000);
    const day = Math.floor(diffMs / 86400000);
    if (min < 1) return "刚刚";
    if (min < 60) return min + "m";
    if (hr < 24) return hr + "h";
    if (day < 7) return day + "d";
    return d.toLocaleDateString("zh-CN", { month: "2-digit", day: "2-digit" });
  }

  function renderConversationList() {
    convListEl.innerHTML = "";
    if (conversations.length === 0) {
      convListEl.innerHTML = '<div class="sidebar-empty"><p>暂无对话记录</p></div>';
      return;
    }
    conversations.sort((a, b) => b.updatedAt - a.updatedAt);
    for (const conv of conversations) {
      const item = document.createElement("div");
      item.className = "conv-item" + (conv.id === currentConvId ? " active" : "");

      const title = document.createElement("div");
      title.className = "conv-title";
      title.textContent = conv.title;
      title.title = conv.title;

      const meta = document.createElement("div");
      meta.className = "conv-meta";
      meta.textContent = formatDate(conv.updatedAt);

      const actions = document.createElement("div");
      actions.className = "conv-actions";

      const delBtn = document.createElement("button");
      delBtn.className = "delete-btn";
      delBtn.textContent = "×";
      delBtn.title = "删除此对话";
      delBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        deleteConversation(conv.id);
      });
      actions.appendChild(delBtn);

      item.appendChild(title);
      item.appendChild(meta);
      item.appendChild(actions);
      item.addEventListener("click", () => switchConversation(conv.id));

      convListEl.appendChild(item);
    }
  }

  function newConversation() {
    if (currentConvId && messages.length > 0) saveCurrentToStorage();
    const conv = {
      id: generateId(),
      title: "新对话",
      messages: [],
      createdAt: Date.now(),
      updatedAt: Date.now(),
    };
    conversations.push(conv);
    currentConvId = conv.id;
    messages = [];
    saveConversations(conversations);
    renderConversationList();
    showWelcome();
    input.focus();
  }

  function switchConversation(convId) {
    if (currentConvId && messages.length > 0) saveCurrentToStorage();
    const conv = conversations.find((c) => c.id === convId);
    if (!conv) return;
    currentConvId = conv.id;
    messages = [...conv.messages];
    renderConversationList();
    renderMessages();
  }

  function deleteConversation(convId) {
    conversations = conversations.filter((c) => c.id !== convId);
    saveConversations(conversations);
    if (currentConvId === convId) {
      currentConvId = null;
      messages = [];
      showWelcome();
    }
    renderConversationList();
  }

  function saveCurrentToStorage() {
    if (!currentConvId) return;
    const conv = conversations.find((c) => c.id === currentConvId);
    if (!conv) return;
    conv.messages = messages.map((m) => ({ ...m }));
    conv.updatedAt = Date.now();
    const firstUser = messages.find((m) => m.role === "user");
    if (firstUser && conv.title === "新对话") {
      conv.title = firstUser.content.slice(0, 30) + (firstUser.content.length > 30 ? "…" : "");
    }
    saveConversations(conversations);
  }

  function showWelcome() {
    welcome.style.display = "flex";
    messagesContainer.innerHTML = "";
  }

  function renderMessages() {
    welcome.style.display = messages.length === 0 ? "flex" : "none";
    messagesContainer.innerHTML = "";
    for (const msg of messages) {
      appendMessage(msg.role, msg.content, false);
    }
  }

  // ── Chat ────────────────────────────────────────────────────────────
  let isStreaming = false;
  let isConnected = false;
  let currentController = null;

  // Auto-resize textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });

  // Enter to send
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function checkHealth() {
    fetch("/api/health")
      .then((r) => r.ok ? r.json() : Promise.reject())
      .then(() => {
        isConnected = true;
        statusEl.textContent = "已连接";
        statusEl.className = "status-indicator online";
      })
      .catch(() => {
        isConnected = false;
        statusEl.textContent = "未连接";
        statusEl.className = "status-indicator offline";
      });
  }

  function appendMessage(role, content, animate = true) {
    if (messages.length === 0 && role !== undefined) {
      welcome.style.display = "none";
    }

    const msg = document.createElement("div");
    msg.className = "message" + (role === "user" ? " user" : " ai");
    if (!animate) msg.style.animation = "none";

    // Header with role label
    const header = document.createElement("div");
    header.className = "message-header";

    const label = document.createElement("span");
    label.className = "role-label " + role;
    label.textContent = role === "user" ? "> user" : "> ai";

    const line = document.createElement("span");
    line.className = "role-line";
    line.style.minWidth = "12px";

    const time = document.createElement("span");
    time.className = "message-time";
    time.textContent = new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });

    header.appendChild(label);
    header.appendChild(line);
    header.appendChild(time);

    // Body
    const body = document.createElement("div");
    body.className = "message-body";
    if (content) {
      body.innerHTML = formatContent(content);
    } else {
      body.innerHTML = '<span style="color:var(--text-tertiary)">—</span>';
    }

    msg.appendChild(header);
    msg.appendChild(body);
    messagesContainer.appendChild(msg);
    scrollToBottom();
    return body;
  }

  function formatContent(text) {
    // Use marked for markdown rendering if available
    if (typeof marked !== 'undefined') {
      return marked.parse(text);
    }
    // Fallback: Basic markdown-like formatting
    // Code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
    });
    // Inline code
    text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
    // Paragraphs
    text = text.split("\n\n").map(p => `<p>${escapeHtml(p).replace(/\n/g, "<br>")}</p>`).join("");
    return text;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function showThinking() {
    welcome.style.display = "none";
    const msg = document.createElement("div");
    msg.className = "message ai";
    msg.id = "thinking-msg";

    const header = document.createElement("div");
    header.className = "message-header";

    const label = document.createElement("span");
    label.className = "role-label ai";
    label.textContent = "> ai";

    const line = document.createElement("span");
    line.className = "role-line";

    const time = document.createElement("span");
    time.className = "message-time";
    time.textContent = new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });

    header.appendChild(label);
    header.appendChild(line);
    header.appendChild(time);

    const body = document.createElement("div");
    body.className = "message-body thinking";
    body.innerHTML = '<span class="thinking-ring"></span><span class="thinking-label">thinking…</span>';

    msg.appendChild(header);
    msg.appendChild(body);
    messagesContainer.appendChild(msg);
    scrollToBottom();
  }

  function removeThinking() {
    const el = document.getElementById("thinking-msg");
    if (el) el.remove();
  }

  function scrollToBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // Request timeout in milliseconds
  const REQUEST_TIMEOUT = 300000; // 5 minutes

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isStreaming) return;

    // Validate input length
    const MAX_INPUT_LENGTH = 5000;
    if (text.length > MAX_INPUT_LENGTH) {
      alert(`输入内容过长（${text.length} / ${MAX_INPUT_LENGTH} 字符）`);
      return;
    }

    input.value = "";
    input.style.height = "auto";

    if (!currentConvId) newConversation();

    appendMessage("user", text);
    messages.push({ role: "user", content: text });

    isStreaming = true;
    sendBtn.style.display = "none";
    cancelBtn.style.display = "inline-block";
    showThinking();

    // Create abort controller for both user cancel and timeout
    currentController = new AbortController();

    // Set up timeout
    const timeoutId = setTimeout(() => {
      currentController.abort();
    }, REQUEST_TIMEOUT);

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages }),
        signal: currentController.signal,
      });

      // Clear timeout after fetch completes (before reading stream)
      clearTimeout(timeoutId);

      removeThinking();

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const body = appendMessage("ai", "");
      let fullContent = "";

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6);
          if (data === "") continue;

          try {
            const json = JSON.parse(data);
            if (json.error) {
              // Show error in message body but don't store it as assistant message
              body.innerHTML = `<p style="color:var(--error)">${escapeHtml(json.error)}</p>`;
              body.classList.add("error");
              // Remove error message from storage - don't save errors as conversation history
              messages.pop(); // Remove the empty ai message we added earlier
              saveCurrentToStorage();
              renderConversationList();
              return;
            }
            if (json.done) {
              body.innerHTML = formatContent(fullContent);
              messages.push({ role: "assistant", content: fullContent });
              saveCurrentToStorage();
              renderConversationList();
              return;
            }
            if (json.content !== undefined) {
              fullContent += json.content;
              body.textContent = fullContent;
              scrollToBottom();
            }
          } catch { /* skip */ }
        }
      }

      if (fullContent === "") {
        removeThinking();
        appendMessage("ai", "连接中断，未能收到回复");
        messages.push({ role: "assistant", content: "连接中断，未能收到回复" });
        saveCurrentToStorage();
        renderConversationList();
      }
    } catch (err) {
      if (err.name === "AbortError") {
        // User cancelled - don't add to message history
        removeThinking();
      } else {
        removeThinking();
        appendMessage("ai", `请求失败: ${err.message}`);
        messages.push({ role: "assistant", content: `请求失败: ${err.message}` });
        saveCurrentToStorage();
        renderConversationList();
      }
    } finally {
      currentController = null;
      isStreaming = false;
      sendBtn.style.display = "inline-block";
      cancelBtn.style.display = "none";
      sendBtn.disabled = false;
    }
  }

  function cancelStreaming() {
    if (currentController) currentController.abort();
  }

  // ── Init ────────────────────────────────────────────────────────────
  renderConversationList();
  checkHealth();
</script>

</body>
</html>
